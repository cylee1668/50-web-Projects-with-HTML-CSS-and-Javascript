<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>border-radius 示例</title>
  <style>
    .box {
      width: 150px;
      height: 150px;
      background-color: #4caf50;
      margin: 20px;
      display: inline-block;
      text-align: center;
      line-height: 150px;
      color: white;
      font-weight: bold;
    }
    .radius25 { border-radius: 25% 0; }
    .radius50 { border-radius: 50% 0;  }
    .radius100 { border-radius: 100% 0; }
  </style>
</head>
<body>
  <div class="box radius25">25%</div>
  <div class="box radius50">50%</div>
  <div class="box radius100">100%</div>
</body>
</html>
